name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install poetry==2.1.3
      - run: poetry install --with dev
      - run: poetry run ruff format --check .
      - run: poetry run ruff check .

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install poetry==2.1.3
      - run: poetry install --with dev
      - run: poetry run mypy src/pgrelay tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
        postgres-version: ["15", "16", "17"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_DB: pgrelay
          POSTGRES_USER: pgrelay
          POSTGRES_PASSWORD: pgrelay
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgrelay -d pgrelay"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install poetry==2.1.3
      - run: poetry install --with dev
      - run: poetry run pytest -q --cov=src/pgrelay --cov-fail-under=85

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up --build -d
      - run: curl --retry 30 --retry-all-errors --retry-delay 2 -fsS http://localhost:8090/healthz
      - run: curl --retry 30 --retry-all-errors --retry-delay 2 -fsS http://localhost:8090/readyz
